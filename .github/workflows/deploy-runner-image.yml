name: Deploy Runner Image

on:
  push:
    branches: [main]
    paths:
      - "infra/runners/Dockerfile"
      - "infra/runners/startup.sh"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push runner image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          az acr build \
            --registry crbasileusrundev \
            --image basileus/github-runner:latest \
            --image basileus/github-runner:sha-${SHORT_SHA} \
            --file infra/runners/Dockerfile \
            infra/runners/
